services:
   redis:
      image: docker.io/valkey/valkey:9-alpine

   postgres:
      image: docker.io/postgres:18-alpine
      environment:
         - POSTGRES_PASSWORD=asdfasdf # change this
      volumes:
         - postgres-data:/var/lib/postgresql

   flaskbb: &flaskbb
      image: flaskbb
      build:
         context: ./build/
      user: uwsgi:uwsgi
      depends_on:
         - postgres
         - redis
      volumes:
         # FIXME
         - ./config/uwsgi.ini:/app/flaskbb/uwsgi.ini
         - ./logs:/app/flaskbb/logs
         - ./storage:/app/flaskbb/storage
         #- ./storage/translations:/app/flaskbb/flaskbb/translations

      command: uwsgi --ini /app/flaskbb/uwsgi.ini

   celery:
      <<: *flaskbb
      user: uwsgi:uwsgi
      command: flaskbb celery worker

volumes:
   postgres-data:

